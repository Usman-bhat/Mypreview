<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Environment</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1e212b;
            --primary: #6366f1;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
        }

        .input-group {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--muted);
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .buttons {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        #output {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            font-family: monospace;
            color: #10b981;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="container" id="test-card">
        <h1>Welcome to the Test Environment</h1>
        <p>This page is designed to test your new native-feeling browser extension functionalities. Try typing, clicking, and grabbing elements using the <b>Pick Element</b> button!</p>
        
        <div class="input-group">
            <label for="testInput">Test Keyboard Input</label>
            <input type="text" id="testInput" placeholder="Try typing here naturally...">
        </div>

        <div class="buttons">
            <button id="actionBtn">Click to Test</button>
            <button class="secondary" id="clearBtn">Clear</button>
        </div>

        <div id="output">System ready...</div>
    </div>

    <script>
        const input = document.getElementById('testInput');
        const output = document.getElementById('output');
        const actionBtn = document.getElementById('actionBtn');
        const clearBtn = document.getElementById('clearBtn');

        input.addEventListener('input', (e) => {
            output.textContent = `Typing: ${e.target.value}`;
        });

        actionBtn.addEventListener('click', () => {
            if (!input.value) {
                output.textContent = "Action executed! (Input was empty)";
            } else {
                output.textContent = `Action executed with payload: "${input.value}"`;
            }
        });

        clearBtn.addEventListener('click', () => {
            input.value = '';
            output.textContent = 'Cleared data.';
        });
    </script>
</body>
</html>
